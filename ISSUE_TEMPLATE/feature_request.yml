name: 機能リクエスト
description: 新しい機能や改善の提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストありがとうございます。以下の項目を記入してください。

  - type: textarea
    id: description
    attributes:
      label: 機能の説明
      description: 追加・改善してほしい機能を説明してください
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: ユースケース
      description: この機能がどのような場面で役立つか教えてください
      placeholder: |
        例: 大量のテーブルがある DUMP ファイルを扱う際に、
        テーブル名でフィルタリングできると効率的です。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 現在の回避策や、検討した代替案があれば教えてください
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショット、参考資料など
    validations:
      required: false
